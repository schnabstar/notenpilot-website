<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 640" width="360" height="640">
  <!-- iPhone Frame -->
  <rect x="0" y="0" width="360" height="640" rx="24" ry="24" fill="#e8edf2" stroke="#d5dce4" stroke-width="2"/>
  <!-- Notch -->
  <rect x="120" y="0" width="120" height="28" rx="14" ry="14" fill="#d5dce4"/>
  <!-- Home Bar -->
  <rect x="130" y="618" width="100" height="5" rx="2.5" ry="2.5" fill="#c0c8d2"/>
  <!-- Checklist Icon -->
  <!-- Checkmark 1 -->
  <rect x="140" y="275" width="20" height="20" rx="4" fill="none" stroke="#5d6d7e" stroke-width="2.5" opacity="0.5"/>
  <polyline points="144,286 149,292 157,280" fill="none" stroke="#5d6d7e" stroke-width="2.5" opacity="0.5"/>
  <rect x="170" y="281" width="60" height="6" rx="3" fill="#5d6d7e" opacity="0.3"/>
  <!-- Checkmark 2 -->
  <rect x="140" y="305" width="20" height="20" rx="4" fill="none" stroke="#5d6d7e" stroke-width="2.5" opacity="0.5"/>
  <polyline points="144,316 149,322 157,310" fill="none" stroke="#5d6d7e" stroke-width="2.5" opacity="0.5"/>
  <rect x="170" y="311" width="50" height="6" rx="3" fill="#5d6d7e" opacity="0.3"/>
  <!-- Unchecked 3 -->
  <rect x="140" y="335" width="20" height="20" rx="4" fill="none" stroke="#5d6d7e" stroke-width="2.5" opacity="0.5"/>
  <rect x="170" y="341" width="55" height="6" rx="3" fill="#5d6d7e" opacity="0.3"/>
  <!-- Label -->
  <text x="180" y="420" text-anchor="middle" fill="#5d6d7e" font-family="system-ui, sans-serif" font-size="18" font-weight="600">Checklisten</text>
</svg>