  <path d="M170 260l20 20" stroke="#5d6d7e" stroke-width="2.5" fill="none" opacity="0.5"/>
  <line x1="142" y1="290" x2="176" y2="290" stroke="#5d6d7e" stroke-width="2" opacity="0.4"/>
